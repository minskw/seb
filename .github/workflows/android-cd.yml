name: Android CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  # Otomatis build setiap malam pukul 00:00 WIB (17:00 UTC) dari branch main
  schedule:
    - cron: '0 17 * * *'
  # Bisa juga trigger manual dari GitHub UI
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Jenis rilis'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - snapshot
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────
  # 1. BUILD & SIGN RELEASE
  # ────────────────────────────────────────────
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    outputs:
      version:      ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      is_tag:       ${{ steps.version.outputs.is_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Extract version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | awk -F'"' '{print $2}' | head -1)
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | awk '{print $2}' | head -1)
          IS_TAG=${{ startsWith(github.ref, 'refs/tags/v') }}
          echo "version=$VERSION"        >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "is_tag=$IS_TAG"          >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION (code: $VERSION_CODE) | Tag: $IS_TAG"

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Build Release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*-unsigned.apk" | head -1)
          SIGNED_APK="app/build/outputs/apk/release/SafeExamBrowser-${{ steps.version.outputs.version }}-release.apk"

          $APKSIGNER sign \
            --ks release.keystore \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$UNSIGNED_APK"

          $APKSIGNER verify "$SIGNED_APK"
          echo "✅ APK signed: $SIGNED_APK"

      - name: Sign AAB with jarsigner
        run: |
          UNSIGNED_AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          SIGNED_AAB="app/build/outputs/bundle/release/SafeExamBrowser-${{ steps.version.outputs.version }}-release.aab"

          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -signedjar "$SIGNED_AAB" \
            "$UNSIGNED_AAB" \
            "${{ secrets.KEY_ALIAS }}"

          echo "✅ AAB signed: $SIGNED_AAB"

      - name: Clean up keystore
        if: always()
        run: rm -f release.keystore

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/SafeExamBrowser-*-release.apk
          retention-days: 30

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ steps.version.outputs.version }}
          path: app/build/outputs/bundle/release/SafeExamBrowser-*-release.aab
          retention-days: 30

  # ────────────────────────────────────────────
  # 2. AUTO-BUMP VERSION pada push ke main (bukan tag)
  # ────────────────────────────────────────────
  auto-bump-version:
    name: Auto Bump versionCode
    runs-on: ubuntu-latest
    needs: build-release
    # Hanya jalankan saat push ke main, bukan saat tag atau schedule
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump versionCode in build.gradle
        run: |
          OLD=$(grep 'versionCode' app/build.gradle | awk '{print $2}' | head -1)
          NEW=$((OLD + 1))
          sed -i "s/versionCode $OLD/versionCode $NEW/" app/build.gradle
          echo "versionCode: $OLD → $NEW"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git diff --cached --quiet || git commit -m "chore: bump versionCode [skip ci]"
          git push

  # ────────────────────────────────────────────
  # 3. CREATE GITHUB RELEASE (hanya pada tag v*)
  # ────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download signed APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ needs.build-release.outputs.version }}
          path: release-artifacts/

      - name: Download signed AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab-${{ needs.build-release.outputs.version }}
          path: release-artifacts/

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Ambil pesan commit sejak tag sebelumnya
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"           >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          name: "Safe Exam Browser v${{ needs.build-release.outputs.version }}"
          body: |
            ## 📱 Safe Exam Browser v${{ needs.build-release.outputs.version }}

            ### 🔄 Perubahan
            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Artifacts
            | File | Keterangan |
            |------|-----------|
            | `SafeExamBrowser-*-release.apk` | Install langsung di perangkat Android |
            | `SafeExamBrowser-*-release.aab` | Bundle untuk Google Play Store |

            ### 🚀 Cara Install APK
            1. Download file `.apk` dari **Assets** di bawah
            2. Di perangkat Android, aktifkan **Instal dari sumber tidak dikenal**
            3. Buka file APK dan ikuti panduan instalasi

            ### ✨ Fitur Utama
            - 📋 Daftar ujian dengan info Mapel, Tanggal, Waktu, dan Durasi
            - 🔗 Buka Google Form langsung dalam aplikasi (mode kiosk)
            - 🔒 Anti-cheat: blokir screenshot, deteksi root/VPN/developer mode
            - 📅 Date & time picker saat input ujian

            ---
            ✅ APK ditandatangani dengan release keystore
            🔢 Version code: ${{ needs.build-release.outputs.version_code }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────
  # 4. NOTIFIKASI HASIL BUILD (opsional — Slack/Telegram)
  # Uncomment dan isi SLACK_WEBHOOK_URL / TELEGRAM_BOT_TOKEN di secrets
  # ────────────────────────────────────────────
